<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="container login-container">
        <div class="header-text">
            <h2>Welcome Back</h2>
            <p>Please enter your details to sign in.</p>
        </div>
        
        <form action="#" method="GET">
            <div class="input-group">
                <input type="email" placeholder="Email Address" required>
                <i class="fa-solid fa-envelope input-icon"></i>
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Password" required>
                <i class="fa-solid fa-lock input-icon"></i>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> 
                    <span class="custom-checkbox"></span>
                    Remember me
                </label>
                <a href="#" class="forgot-pass">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn">Login</button>
            
            <div class="divider">
                <span>Or continue with</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn"><i class="fa-brands fa-google"></i></button>
                <button type="button" class="social-btn"><i class="fa-brands fa-github"></i></button>
                <button type="button" class="social-btn"><i class="fa-brands fa-facebook-f"></i></button>
            </div>

            <div class="links">
                Don't have an account? <a href="register.html">Sign up here</a>
            </div>
        </form>
    </div>

    <footer>
        &copy;KaryleLibrero 2026
    </footer>
</body>
</html>
