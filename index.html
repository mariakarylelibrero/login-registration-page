<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <div class="container register-container">
        <div class="header-text">
            <h2>Create Account</h2>
            <p>Join us today! Please fill in your details.</p>
        </div>

        <form action="index.html" method="GET">
            <div class="input-group">
                <input type="text" placeholder="Full Name" required>
                <i class="fa-solid fa-user input-icon"></i>
            </div>

            <div class="input-group">
                <input type="email" placeholder="Email Address" required>
                <i class="fa-solid fa-envelope input-icon"></i>
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Password" required>
                <i class="fa-solid fa-lock input-icon"></i>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Confirm Password" required>
                <i class="fa-solid fa-shield-halved input-icon"></i>
            </div>
            
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" required> 
                    <span class="custom-checkbox"></span>
                    I agree to the <a href="#" class="forgot-pass">Terms & Conditions</a>
                </label>
            </div>

            <button type="submit" class="btn">Sign Up</button>
            
            <div class="divider">
                <span>Or register with</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-btn"><i class="fa-brands fa-google"></i></button>
                <button type="button" class="social-btn"><i class="fa-brands fa-github"></i></button>
                <button type="button" class="social-btn"><i class="fa-brands fa-facebook-f"></i></button>
            </div>

            <div class="links">
                Already have an account? <a href="index.html">Login here</a>
            </div>
        </form>
    </div>

    <footer>
        &copy;KaryleLibrero 2026
    </footer>
</body>
</html>
